server.port=${PORT:8080}
spring.application.name=springguard-backend

# Database (values come from environment variables — never hardcode secrets)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# JWT (override JWT_SECRET in production with a long random value)
jwt.secret=${JWT_SECRET:dev-only-change-me-to-a-long-random-secret-0123456789abcdef}
jwt.expiration-ms=86400000

# return exception reasons in error responses so the UI can show them
server.error.include-message=always
